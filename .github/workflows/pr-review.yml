name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    # Run on PR open/push, or on comments that mention @review-agent
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@review-agent'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        if: github.event_name == 'issue_comment'
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          gh pr checkout "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine event context
        id: context
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "event_type=${{ github.event.action }}" >> "$GITHUB_OUTPUT"
            echo "comment_body=" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "event_type=comment" >> "$GITHUB_OUTPUT"
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "comment_body<<$EOF" >> "$GITHUB_OUTPUT"
            echo "${{ github.event.comment.body }}" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Run review agent
        working-directory: ${{ github.workspace }}
        run: python scripts/review_agent.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          EVENT_TYPE: ${{ steps.context.outputs.event_type }}
          COMMENT_BODY: ${{ steps.context.outputs.comment_body }}
          PYTHONPATH: ${{ github.workspace }}/scripts
